services:
  postgres:
    image: postgres:16-alpine
    container_name: identity-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: identity
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: identity-cache
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    container_name: identity-storage
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  # Helper to create the bucket on startup
  minio-setup:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb --ignore-existing local/avatars;
      /usr/bin/mc anonymous set public local/avatars;
      exit 0;
      "

  mailslurper:
    image: orangesys/mailslurper
    container_name: identity-mail
    ports:
      - "2500:2500" # SMTP
      - "8085:8080" # Web UI (mapped to 8085 to avoid conflict with Ktor)
      - "8081:8081" # API

volumes:
  postgres_data:
  minio_data:
