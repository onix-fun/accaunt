name: Release account images

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  test-build-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "23"
          cache: maven

      - name: Test profile service
        working-directory: profile
        run: mvn test

      - name: Build profile frontend
        working-directory: profile-frontend
        run: |
          npm ci
          npm run build

      - name: Test account gateway Lua
        run: |
          tmp_dir="$(mktemp -d)"
          openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048 -out "$tmp_dir/private.pem"
          openssl pkey -in "$tmp_dir/private.pem" -pubout -out "$tmp_dir/public.pem"
          token="$(profile-gateway/tests/generate-rs256-token.sh "$tmp_dir/private.pem")"
          docker run --rm \
            -v "$PWD":/account \
            -v "$tmp_dir/public.pem":/tmp/public.pem:ro \
            -e IDENTITY_JWT_PUBLIC_KEY_PATH=/tmp/public.pem \
            -e TEST_RS256_TOKEN="$token" \
            -w /account/profile-gateway \
            openresty/openresty:1.27.1.2-0-alpine-fat \
            /bin/sh -c "opm get fffonion/lua-resty-openssl && resty tests/test_browser_security.lua && resty tests/test_jwt_auth.lua && resty tests/test_rs256_token.lua"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push profile service
        uses: docker/build-push-action@v6
        with:
          context: profile
          file: profile/Dockerfile.dev
          push: true
          tags: |
            ghcr.io/onix-fun/account-service:${{ github.ref_name }}
            ghcr.io/onix-fun/account-service:latest

      - name: Build and push account gateway
        uses: docker/build-push-action@v6
        with:
          context: .
          file: profile-gateway/Dockerfile
          push: true
          tags: |
            ghcr.io/onix-fun/account-gateway:${{ github.ref_name }}
            ghcr.io/onix-fun/account-gateway:latest
